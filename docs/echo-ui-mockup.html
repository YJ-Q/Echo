<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo - Deep Signal</title>
<style>
  :root {
    --bg-void: #02040a;
    --bg-base: #060b17;
    --bg-nav: #04070f;
    --bg-surface: #0f172a;
    --text-pure: #ffffff;
    --text-main: #e2e8f0;
    --text-muted: #718199;
    --text-dim: #3f4f66;
    --accent-bright: #38bdf8;
    --accent-soft: #7dd3fc;
    --accent-glow: rgba(56, 189, 248, 0.42);
    --accent-dim: rgba(56, 189, 248, 0.16);
    --border-line: rgba(148, 163, 184, 0.16);
    --font-sans: "SF Pro Display", "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
    --font-mono: "JetBrains Mono", "Cascadia Code", "SF Mono", monospace;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    min-width: 960px;
    color: var(--text-main);
    background: var(--bg-void);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.6;
    letter-spacing: 0;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 38%, rgba(15, 23, 42, 0.92) 0%, rgba(2, 4, 10, 0.92) 64%, var(--bg-void) 100%),
      radial-gradient(circle at 58% 30%, rgba(56, 189, 248, 0.13), transparent 25%),
      linear-gradient(180deg, #050915, #02040a);
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 40;
    pointer-events: none;
    opacity: 0.55;
    background:
      repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(255, 255, 255, 0.012) 3px),
      radial-gradient(circle at center, transparent 44%, rgba(0, 0, 0, 0.18) 100%);
  }

  .app-layout {
    position: relative;
    z-index: 10;
    display: grid;
    height: 100vh;
    grid-template-columns: 72px 1fr;
  }

  .nav-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 0;
    border-right: 1px solid var(--border-line);
    background: rgba(4, 7, 15, 0.72);
    backdrop-filter: blur(14px);
  }

  .nav-logo {
    width: 12px;
    height: 12px;
    margin-bottom: 60px;
    border-radius: 1px;
    background: var(--text-pure);
    box-shadow: 0 0 10px var(--text-pure), 0 0 22px var(--accent-bright);
    animation: logoPulse 4s infinite ease-in-out;
  }

  .nav-items {
    display: flex;
    width: 100%;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .nav-item {
    position: relative;
    display: flex;
    width: 42px;
    height: 42px;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 220ms ease, background 220ms ease;
  }

  .nav-item::after {
    content: attr(data-tooltip);
    position: absolute;
    left: 54px;
    z-index: 80;
    padding: 6px 12px;
    border: 1px solid var(--accent-dim);
    background: rgba(15, 23, 42, 0.95);
    color: var(--text-pure);
    font-family: var(--font-mono);
    font-size: 12px;
    opacity: 0;
    pointer-events: none;
    transform: translateX(-10px);
    transition: opacity 180ms ease, transform 180ms ease;
    white-space: nowrap;
  }

  .nav-item:hover {
    color: var(--text-main);
  }

  .nav-item:hover::after {
    opacity: 1;
    transform: translateX(0);
  }

  .nav-item.active {
    color: var(--accent-bright);
  }

  .nav-item.active::before {
    content: "";
    position: absolute;
    left: -15px;
    top: 20%;
    width: 2px;
    height: 60%;
    background: var(--accent-bright);
    box-shadow: 0 0 12px var(--accent-bright);
  }

  .icon-core {
    width: 6px;
    height: 6px;
    background: currentColor;
    box-shadow:
      -8px 0 0 -1.5px currentColor,
      8px 0 0 -1.5px currentColor,
      0 -8px 0 -1.5px currentColor,
      0 8px 0 -1.5px currentColor;
  }

  .icon-ripple {
    width: 15px;
    height: 2px;
    background: currentColor;
    box-shadow: 0 -5px 0 -1px currentColor, 0 5px 0 -1px currentColor;
  }

  .icon-needle {
    position: relative;
    width: 2px;
    height: 15px;
    background: currentColor;
  }

  .icon-needle::before {
    content: "";
    position: absolute;
    top: -4px;
    left: -3px;
    width: 8px;
    height: 8px;
    border: 1px solid currentColor;
    transform: rotate(45deg);
  }

  .icon-loop {
    width: 15px;
    height: 15px;
    border: 1px dashed currentColor;
    border-radius: 50%;
  }

  .icon-layer {
    width: 15px;
    height: 2px;
    background: currentColor;
    box-shadow: 0 -5px 0 currentColor, 0 5px 0 currentColor;
  }

  .workspace {
    position: relative;
    display: flex;
    height: 100%;
    flex-direction: column;
    padding: 32px 0;
  }

  .content-wrapper {
    display: flex;
    width: min(100%, 880px);
    height: 100%;
    flex-direction: column;
    margin: 0 auto;
    padding: 0 40px;
  }

  .top-status {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 38px;
    animation: fadeInDown 700ms ease both;
  }

  .top-status h1 {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-pure);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 1px;
  }

  .status-highlight {
    color: var(--accent-bright);
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .top-status p {
    color: var(--text-muted);
    font-size: 13px;
  }

  .echo-habitat {
    position: relative;
    display: flex;
    height: 244px;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }

  .echo-habitat::before {
    content: "";
    position: absolute;
    width: min(72vw, 680px);
    height: 180px;
    opacity: 0.35;
    background:
      linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.1), transparent),
      repeating-linear-gradient(90deg, transparent 0 34px, rgba(148, 163, 184, 0.1) 35px, transparent 36px);
    mask-image: radial-gradient(ellipse at center, black 0%, black 34%, transparent 72%);
  }

  .echo-entity {
    position: relative;
    display: grid;
    width: 120px;
    height: 120px;
    place-items: center;
    transition: transform 700ms cubic-bezier(0.16, 1, 0.3, 1);
  }

  .echo-entity.active {
    transform: scale(1.15);
  }

  .echo-core {
    position: relative;
    z-index: 10;
    width: 4px;
    height: 4px;
    background: var(--text-pure);
    box-shadow:
      0 0 12px var(--text-pure),
      0 0 26px var(--accent-bright),
      0 0 42px var(--accent-bright);
    animation: coreBreathe 4s infinite ease-in-out;
  }

  .echo-entity.active .echo-core {
    box-shadow:
      0 0 15px var(--text-pure),
      0 0 36px var(--accent-bright),
      0 0 62px var(--accent-bright);
    animation: coreBreatheActive 2s infinite ease-in-out;
  }

  .echo-entity.recording .echo-core {
    box-shadow:
      0 0 16px var(--text-pure),
      0 0 44px var(--accent-bright),
      0 0 84px var(--text-pure);
    animation: coreRecord 1s infinite alternate;
  }

  .echo-ripple {
    position: absolute;
    z-index: 5;
    border: 1px solid var(--accent-dim);
    border-radius: 50%;
    opacity: 0;
  }

  .ripple-1 {
    animation: signalWave 6s infinite linear;
  }

  .ripple-2 {
    border-color: rgba(255, 255, 255, 0.055);
    animation: signalWave 6s infinite linear 2s;
  }

  .ripple-3 {
    animation: signalWave 6s infinite linear 4s;
  }

  .echo-entity.active .echo-ripple {
    border-color: var(--accent-glow);
    animation-duration: 3s;
  }

  .echo-entity.recording .echo-ripple {
    border-color: rgba(255, 255, 255, 0.32);
    animation-duration: 1.5s;
  }

  .echo-particles {
    position: absolute;
    inset: 0;
    z-index: 8;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 1px;
    height: 1px;
    background: rgba(255, 255, 255, 0.82);
    opacity: 0;
  }

  .chat-stream {
    display: flex;
    min-height: 0;
    flex: 1;
    flex-direction: column;
    gap: 30px;
    overflow-y: auto;
    padding-bottom: 122px;
    scrollbar-width: none;
    mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
  }

  .chat-stream::-webkit-scrollbar {
    display: none;
  }

  .msg-group {
    display: flex;
    max-width: 80%;
    flex-direction: column;
    animation: fadeInUp 420ms ease both;
  }

  .msg-user {
    align-self: flex-end;
    align-items: flex-end;
  }

  .msg-echo {
    align-self: flex-start;
    align-items: flex-start;
  }

  .msg-label {
    margin-bottom: 8px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .msg-content {
    color: var(--text-main);
    font-size: 15px;
    line-height: 1.72;
    text-wrap: pretty;
  }

  .msg-user .msg-content {
    color: var(--text-pure);
    text-align: right;
  }

  .msg-echo .msg-content {
    padding-left: 20px;
    border-left: 1px solid var(--accent-dim);
    color: var(--text-main);
  }

  .input-area-wrapper {
    position: absolute;
    right: 0;
    bottom: 40px;
    left: 72px;
    display: flex;
    justify-content: center;
    padding: 0 40px;
  }

  .input-slot {
    display: flex;
    width: min(100%, 800px);
    align-items: center;
    gap: 12px;
    padding: 8px 8px 8px 24px;
    border: 1px solid var(--border-line);
    background: rgba(10, 15, 28, 0.66);
    backdrop-filter: blur(14px);
    transition: border-color 220ms ease, background 220ms ease, box-shadow 220ms ease;
  }

  .input-slot:focus-within {
    border-color: var(--accent-glow);
    background: rgba(10, 15, 28, 0.84);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 15px var(--accent-dim);
  }

  .input-slot.is-recording {
    border-color: var(--text-pure);
    box-shadow: 0 0 22px rgba(255, 255, 255, 0.11);
  }

  .input-field {
    min-width: 0;
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--text-pure);
    font: 14px/1.5 var(--font-sans);
  }

  .input-field::placeholder {
    color: var(--text-dim);
  }

  .btn-pixel {
    padding: 10px 20px;
    border: 1px solid var(--border-line);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 180ms ease;
  }

  .btn-pixel:hover {
    border-color: var(--accent-bright);
    background: rgba(56, 189, 248, 0.06);
    color: var(--accent-bright);
  }

  .btn-pixel:active {
    background: var(--accent-bright);
    color: var(--bg-void);
  }

  .btn-send {
    border-color: var(--accent-dim);
    color: var(--accent-bright);
  }

  .btn-send:hover {
    background: var(--accent-bright);
    color: var(--bg-void);
  }

  .btn-voice.recording-active {
    border-color: var(--text-pure);
    background: var(--text-pure);
    color: var(--bg-void);
  }

  @keyframes logoPulse {
    0%, 100% { opacity: 0.62; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  @keyframes coreBreathe {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  @keyframes coreBreatheActive {
    0%, 100% { opacity: 0.9; transform: scale(1.2); }
    50% { opacity: 1; transform: scale(2); }
  }

  @keyframes coreRecord {
    0% { opacity: 0.8; transform: scale(1.5); }
    100% { opacity: 1; transform: scale(2.5); }
  }

  @keyframes signalWave {
    0% { width: 0; height: 0; opacity: 1; }
    100% { width: 300px; height: 300px; opacity: 0; }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 1060px) {
    .content-wrapper {
      width: min(100%, 780px);
      padding: 0 30px;
    }

    .input-area-wrapper {
      padding: 0 30px;
    }
  }
</style>
</head>
<body>
<div class="app-layout">
  <nav class="nav-bar" aria-label="Echo navigation">
    <div class="nav-logo" aria-hidden="true"></div>
    <div class="nav-items">
      <div class="nav-item active" data-tooltip="此刻" aria-label="此刻">
        <div class="icon-core"></div>
      </div>
      <div class="nav-item" data-tooltip="学习" aria-label="学习">
        <div class="icon-ripple"></div>
      </div>
      <div class="nav-item" data-tooltip="行动" aria-label="行动">
        <div class="icon-needle"></div>
      </div>
      <div class="nav-item" data-tooltip="反思" aria-label="反思">
        <div class="icon-loop"></div>
      </div>
      <div class="nav-item" data-tooltip="记忆" aria-label="记忆">
        <div class="icon-layer"></div>
      </div>
    </div>
  </nav>

  <main class="workspace">
    <div class="content-wrapper">
      <div class="top-status">
        <h1>此刻 / <span class="status-highlight">轻度漂移</span></h1>
        <p>信号还在游移，我们先让最响的一件事浮出来。</p>
      </div>

      <div class="echo-habitat">
        <div class="echo-entity" id="echoEntity">
          <div class="echo-ripple ripple-1"></div>
          <div class="echo-ripple ripple-2"></div>
          <div class="echo-ripple ripple-3"></div>
          <div class="echo-core"></div>
          <div class="echo-particles" id="echoParticles"></div>
        </div>
      </div>

      <div class="chat-stream" id="chatStream">
        <div class="msg-group msg-user">
          <div class="msg-label">User</div>
          <div class="msg-content">我感觉今天事情很多，但不知道先做哪个。</div>
        </div>
        <div class="msg-group msg-echo">
          <div class="msg-label">Echo</div>
          <div class="msg-content">我们先不用把全部事情想清楚。先找出现在最吵的一件。</div>
        </div>
        <div class="msg-group msg-user">
          <div class="msg-label">User</div>
          <div class="msg-content">可能是那个还没开始的汇报。</div>
        </div>
        <div class="msg-group msg-echo">
          <div class="msg-label">Echo</div>
          <div class="msg-content">那我们把它缩小到第一步：只写下标题和三个关键词。</div>
        </div>
      </div>
    </div>

    <div class="input-area-wrapper">
      <form class="input-slot" id="composer">
        <input type="text" class="input-field" id="userInput" placeholder="发出一个现在最真实的信号..." autocomplete="off">
        <button type="button" class="btn-pixel btn-voice" id="voiceButton">VOICE</button>
        <button type="submit" class="btn-pixel btn-send">SEND</button>
      </form>
    </div>
  </main>
</div>

<script>
  const particlesContainer = document.getElementById("echoParticles");
  const inputField = document.getElementById("userInput");
  const echoEntity = document.getElementById("echoEntity");
  const chatStream = document.getElementById("chatStream");
  const composer = document.getElementById("composer");
  const voiceButton = document.getElementById("voiceButton");
  const inputSlot = document.querySelector(".input-slot");
  let isRecording = false;

  for (let index = 0; index < 24; index += 1) {
    const particle = document.createElement("div");
    particle.className = "particle";

    const x = Math.random() * 100 + 10;
    const y = Math.random() * 100 + 10;
    const tx = (Math.random() - 0.5) * 60;
    const ty = (Math.random() - 0.5) * 60;
    const duration = Math.random() * 5 + 4;
    const delay = Math.random() * 4;
    const animationName = `particleFloat${index}`;

    const style = document.createElement("style");
    style.textContent = `
      @keyframes ${animationName} {
        0% { opacity: 0; transform: translate(0, 0); }
        30% { opacity: 0.42; }
        70% { opacity: 0.42; }
        100% { opacity: 0; transform: translate(${tx}px, ${ty}px); }
      }
    `;
    document.head.appendChild(style);

    particle.style.left = `${x}px`;
    particle.style.top = `${y}px`;
    particle.style.animation = `${animationName} ${duration}s infinite ease-in-out ${delay}s`;
    particlesContainer.appendChild(particle);
  }

  function scrollToBottom() {
    chatStream.scrollTo({
      top: chatStream.scrollHeight,
      behavior: "smooth"
    });
  }

  function setEchoActive(active) {
    if (active || isRecording) {
      echoEntity.classList.add("active");
    } else {
      echoEntity.classList.remove("active");
    }
  }

  function setRecording(nextRecording) {
    isRecording = nextRecording;
    voiceButton.textContent = isRecording ? "STOP" : "VOICE";
    voiceButton.classList.toggle("recording-active", isRecording);
    echoEntity.classList.toggle("recording", isRecording);
    inputSlot.classList.toggle("is-recording", isRecording);
    inputField.placeholder = isRecording ? "正在接收信号..." : "发出一个现在最真实的信号...";
    setEchoActive(document.activeElement === inputField);
  }

  function appendMessage(sender, text, typeClass) {
    const group = document.createElement("div");
    group.className = `msg-group ${typeClass}`;

    const label = document.createElement("div");
    label.className = "msg-label";
    label.textContent = sender;

    const content = document.createElement("div");
    content.className = "msg-content";
    content.textContent = text;

    group.append(label, content);
    chatStream.appendChild(group);
  }

  inputField.addEventListener("focus", () => setEchoActive(true));
  inputField.addEventListener("blur", () => {
    if (!inputField.value.trim()) setEchoActive(false);
  });

  voiceButton.addEventListener("click", () => {
    setRecording(!isRecording);
    inputField.focus();
  });

  composer.addEventListener("submit", (event) => {
    event.preventDefault();

    if (isRecording) setRecording(false);

    const text = inputField.value.trim();
    if (!text) return;

    appendMessage("User", text, "msg-user");
    inputField.value = "";
    scrollToBottom();
    echoEntity.classList.add("active");

    window.setTimeout(() => {
      appendMessage("Echo", "我们先把它留在一个可执行的形状里。下一步只需要 3 分钟。", "msg-echo");
      scrollToBottom();
      setEchoActive(document.activeElement === inputField);
    }, 900);
  });

  window.setTimeout(scrollToBottom, 100);
</script>
</body>
</html>
